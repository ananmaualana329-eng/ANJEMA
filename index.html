<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te-Bar - Tebengan Bareng UNIMUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background-color: cyan; 
            color: #333;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 80px;
            background-color: rgba(255, 255, 255, 0.2); 
        }

        .logo svg {
            height: 45px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        nav a {
            text-decoration: none;
            color: #033D36;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-nav {
            background-color: #D69E33;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 80px;
            min-height: 80vh;
        }

        .hero-text {
            flex: 1;
            max-width: 700px;
            z-index: 2;
        }

        .hero-text h1 {
            font-size: 4.5rem;
            font-weight: 800;
            color: #033D36; 
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-text .subtitle {
            font-size: 1.5rem;
            color: #033D36;
            font-weight: 600;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.3);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 8px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-primary {
            background-color: #D69E33;
            color: white;
        }

        .btn-secondary {
            background-color: #033D36;
            color: white;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .image-placeholder {
            width: 100%;
            height: 450px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 2px dashed #033D36;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #033D36;
        }

        @media (max-width: 1024px) {
            .hero-text h1 { font-size: 3rem; }
            header, .hero { padding: 20px 40px; }
            .hero { flex-direction: column; text-align: center; }
            .hero-image { margin-top: 50px; width: 100%; }
            .buttons { justify-content: center; }
        }
    </style>
</head>
